name: Lumen
options:
  bundleIdPrefix: com.lumen
  deploymentTarget:
    macOS: "14.0"

targets:
  Lumen:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Generated-Info.plist
      properties:
        CFBundleName: Lumen
        CFBundleExecutable: Lumen
        CFBundleIdentifier: com.lumen.app
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lumen.app
      PRODUCT_NAME: Lumen
      SWIFT_VERSION: "5.9"
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: NO
      ENABLE_HARDENED_RUNTIME: NO
    scheme:
      testTargets:
        - LumenUITests
      gatherCoverageData: true

  LumenUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: Lumen
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: NO
